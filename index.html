<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latent Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #181818;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .frame {
      width: 100%;
      max-width: 1920px;
      padding: 200px;
      background: #18181b;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .subtitle {
      font-size: 24px;
      font-weight: 400;
      color: #ea5808;
    }

    .title {
      font-size: 64px;
      font-weight: 700;
      color: #efefef;
      margin-top: 6px;
    }

    .description {
      font-size: 36px;
      font-weight: 400;
      color: #efefef;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <p class="subtitle">Creative Coding Advanced (BA)</p>
    <h1 class="title">Latent Studio</h1>
    <p class="description">A User-Facing Image Generation Web App</p>
  </div>
</body>
</html>
